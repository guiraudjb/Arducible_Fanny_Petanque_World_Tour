<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Craps — Fanny Pétanque World Tour</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="sr-only">Craps (mise Ligne Pass / Ne Pass Pas) — Fanny Pétanque World Tour</h1>

  <div class="table" id="table">
    <header class="hud">
      <div class="hud-money">
        <span class="hud-label">Bankroll</span>
        <span class="hud-value" id="bankroll">500</span>
      </div>
      <p class="status" id="status" role="status" aria-live="polite"></p>
      <button type="button" class="icon-btn" id="btn-mute" aria-pressed="false" aria-label="Couper la voix de la croupière">🔊</button>
      <button type="button" class="btn btn-ghost" id="btn-new-game">Nouvelle&nbsp;partie</button>
    </header>

    <div class="scene">
      <img class="scene-img" src="../../assets/table/fanny-dealer-scene.jpg" alt="Fanny vous accueille à la table de craps." />
      <div class="dealer-bubble" id="dealer-bubble" aria-live="polite">
        <p id="dealer-bubble-text"></p>
      </div>
    </div>

    <section class="play-zone" aria-label="Craps">
      <div class="point-readout" id="point-readout"></div>
      <div class="dice-row" id="dice-row">
        <div class="die" id="die-1"></div>
        <div class="die" id="die-2"></div>
      </div>
      <p class="roll-total" id="roll-total"></p>
      <p class="result-message" id="result-message"></p>
      <div class="roll-history" id="roll-history" aria-label="Historique des lancers"></div>
      <canvas id="fx-canvas"></canvas>
    </section>

    <footer class="dock">
      <div class="dock-panel" id="betting-area">
        <div class="side-picker" role="group" aria-label="Ligne Pass ou Ne Pass Pas">
          <button type="button" class="side-btn" data-side="pass">Ligne Pass</button>
          <button type="button" class="side-btn" data-side="dontpass">Ne Pass Pas</button>
        </div>
        <div class="bet-readout">
          <span class="bet-label">Mise</span>
          <span class="bet-amount" id="bet-amount">0</span>
        </div>
        <div class="chips" role="group" aria-label="Jetons de mise">
          <button type="button" class="chip" data-chip="10"><span>10</span></button>
          <button type="button" class="chip" data-chip="25"><span>25</span></button>
          <button type="button" class="chip" data-chip="50"><span>50</span></button>
          <button type="button" class="chip" data-chip="100"><span>100</span></button>
        </div>
        <div class="dock-buttons">
          <button type="button" class="btn btn-ghost" id="btn-clear-bet">Effacer</button>
          <button type="button" class="btn btn-primary" id="btn-start">Miser</button>
        </div>
      </div>

      <div class="dock-panel hidden" id="rolling-area">
        <p class="hint" id="hint">Lancez les dés.</p>
        <div class="dock-buttons">
          <button type="button" class="btn btn-primary" id="btn-roll">Lancer les dés</button>
        </div>
      </div>

      <div class="dock-panel hidden" id="result-area">
        <div class="dock-buttons">
          <button type="button" class="btn btn-primary" id="btn-next-round">Manche&nbsp;suivante</button>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
