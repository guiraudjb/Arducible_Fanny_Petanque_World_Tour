<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Belote — Fanny Pétanque World Tour</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="sr-only">Belote à quatre en équipes (vous et Fanny contre deux adversaires) — Fanny Pétanque World Tour</h1>

  <div class="table" id="table">
    <header class="hud">
      <div class="hud-money">
        <span class="hud-label">Bankroll</span>
        <span class="hud-value" id="bankroll">500</span>
      </div>
      <div class="hud-trump" id="hud-trump"></div>
      <p class="status" id="status" role="status" aria-live="polite"></p>
      <button type="button" class="icon-btn" id="btn-mute" aria-pressed="false" aria-label="Couper la voix de la croupière">🔊</button>
      <button type="button" class="btn btn-ghost" id="btn-new-game">Nouvelle&nbsp;partie</button>
    </header>

    <div class="scores-row" id="scores-row">
      <div class="score-box">
        <span class="score-label">Équipe A (vous + Fanny)</span>
        <span class="score-value" id="team-a-score">0</span>
        <span class="pile-count" id="pile-a">0 pli(s)</span>
      </div>
      <div class="trick-counter" id="trick-counter"></div>
      <div class="score-box">
        <span class="score-label">Équipe B</span>
        <span class="score-value" id="team-b-score">0</span>
        <span class="pile-count" id="pile-b">0 pli(s)</span>
      </div>
    </div>

    <section class="fanny-zone" aria-label="Main de Fanny">
      <p class="seat-label">Fanny <span id="fanny-dealer-tag"></span></p>
      <div class="hand back-hand" id="fanny-hand"></div>
    </section>

    <div class="middle-row">
      <section class="opp-zone opp-left" aria-label="Adversaire 1">
        <p class="seat-label">Marcel <span id="opp1-dealer-tag"></span></p>
        <div class="hand back-hand vertical" id="opp1-hand"></div>
      </section>

      <section class="trick-zone" id="trick-zone" aria-label="Pli en cours">
        <div class="trick-slot" id="trick-fanny" data-seat="fanny"></div>
        <div class="trick-mid-row">
          <div class="trick-slot" id="trick-opp1" data-seat="opp1"></div>
          <div class="bidding-panel" id="bidding-panel"></div>
          <div class="trick-slot" id="trick-opp2" data-seat="opp2"></div>
        </div>
        <div class="trick-slot" id="trick-player" data-seat="player"></div>
      </section>

      <section class="opp-zone opp-right" aria-label="Adversaire 2">
        <p class="seat-label">Bernard <span id="opp2-dealer-tag"></span></p>
        <div class="hand back-hand vertical" id="opp2-hand"></div>
      </section>
    </div>

    <div class="dealer-bubble" id="dealer-bubble" aria-live="polite">
      <p id="dealer-bubble-text"></p>
    </div>

    <section class="player-zone" aria-label="Votre main">
      <p class="seat-label">Vous <span id="player-dealer-tag"></span></p>
      <div class="hand player-hand" id="player-hand"></div>
    </section>
    <canvas id="fx-canvas"></canvas>

    <footer class="dock">
      <div class="dock-panel" id="betting-area">
        <div class="bet-readout">
          <span class="bet-label">Mise</span>
          <span class="bet-amount" id="bet-amount">0</span>
        </div>
        <div class="chips" role="group" aria-label="Jetons de mise">
          <button type="button" class="chip" data-chip="10"><span>10</span></button>
          <button type="button" class="chip" data-chip="25"><span>25</span></button>
          <button type="button" class="chip" data-chip="50"><span>50</span></button>
          <button type="button" class="chip" data-chip="100"><span>100</span></button>
        </div>
        <div class="dock-buttons">
          <button type="button" class="btn btn-ghost" id="btn-clear-bet">Effacer</button>
          <button type="button" class="btn btn-primary" id="btn-deal">Distribuer</button>
        </div>
      </div>

      <div class="dock-panel hidden" id="bidding-area">
        <p class="hint" id="bidding-hint"></p>
        <div class="dock-buttons" id="bidding-buttons"></div>
      </div>

      <div class="dock-panel hidden" id="playing-area">
        <p class="hint" id="hint">Touchez une carte pour la jouer.</p>
      </div>

      <div class="dock-panel hidden" id="result-area">
        <p class="result-message" id="result-message"></p>
        <div class="dock-buttons">
          <button type="button" class="btn btn-primary" id="btn-next-round">Manche&nbsp;suivante</button>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
