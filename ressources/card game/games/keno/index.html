<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Keno — Fanny Pétanque World Tour</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="sr-only">Keno (choisissez jusqu'à 10 numéros parmi 80) — Fanny Pétanque World Tour</h1>

  <div class="table" id="table">
    <header class="hud">
      <div class="hud-money">
        <span class="hud-label">Bankroll</span>
        <span class="hud-value" id="bankroll">500</span>
      </div>
      <p class="status" id="status" role="status" aria-live="polite"></p>
      <button type="button" class="icon-btn" id="btn-mute" aria-pressed="false" aria-label="Couper la voix de la croupière">🔊</button>
      <button type="button" class="btn btn-ghost" id="btn-new-game">Nouvelle&nbsp;partie</button>
    </header>

    <div class="paytable" id="paytable" role="table" aria-label="Table des gains pour le nombre de numéros choisis"></div>

    <div class="scene">
      <img class="scene-img" src="../../assets/table/fanny-dealer-scene.jpg" alt="Fanny vous accueille au keno." />
      <div class="dealer-bubble" id="dealer-bubble" aria-live="polite">
        <p id="dealer-bubble-text"></p>
      </div>
    </div>

    <section class="play-zone" aria-label="Keno">
      <p class="result-message" id="result-message"></p>
      <div class="grid-wrap">
        <div class="number-grid" id="number-grid"></div>
      </div>
      <p class="picks-readout" id="picks-readout">0 / 10 numéros choisis</p>
      <canvas id="fx-canvas"></canvas>
    </section>

    <footer class="dock">
      <div class="dock-panel" id="betting-area">
        <div class="bet-readout">
          <span class="bet-label">Mise</span>
          <span class="bet-amount" id="bet-amount">0</span>
        </div>
        <div class="chips" role="group" aria-label="Jetons de mise">
          <button type="button" class="chip" data-chip="10"><span>10</span></button>
          <button type="button" class="chip" data-chip="25"><span>25</span></button>
          <button type="button" class="chip" data-chip="50"><span>50</span></button>
          <button type="button" class="chip" data-chip="100"><span>100</span></button>
        </div>
        <div class="dock-buttons">
          <button type="button" class="btn btn-ghost" id="btn-clear-bet">Effacer mise</button>
          <button type="button" class="btn btn-ghost" id="btn-clear-picks">Effacer numéros</button>
          <button type="button" class="btn btn-primary" id="btn-draw">Miser et tirer</button>
        </div>
      </div>

      <div class="dock-panel hidden" id="result-area">
        <div class="dock-buttons">
          <button type="button" class="btn btn-primary" id="btn-next-round">Manche&nbsp;suivante</button>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
